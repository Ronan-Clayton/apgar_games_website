<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Policies | Apgar Games</title>
    <link rel="icon" href="Apgar Games favicon.png" type="image/png">
    <link href='https://fonts.googleapis.com/css?family=IBM+Plex+Mono' rel='stylesheet'>

    <style>
        body {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 18px;
            text-align: left;
            color: white;
            background-color: #012345;
            margin: 10px;
            padding: 0;
        }
        h1 {
            font-size: 48px;
        }
        p {
            opacity: 0.8;
        }
        .policy-links {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 32px;
            max-width: 480px;
        }
        .policy-link {
            display: block;
            padding: 20px 24px;
            border: 1px solid rgba(255, 255, 255, 0.35);
            color: white;
            text-decoration: none;
            font-style: normal;
            transition: background-color 0.2s, border-color 0.2s;
        }
        .policy-link:hover {
            background-color: rgba(255, 255, 255, 0.07);
            border-color: white;
        }
        .policy-link .app-name {
            font-size: 24px;
            display: block;
            margin-bottom: 6px;
        }
        .policy-link .app-desc {
            font-size: 14px;
            opacity: 0.65;
        }
        .arrow {
            float: right;
            font-style: normal;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <h1>Privacy Policies</h1>
    <p>Select an app to view its privacy policy.</p>

    <div class="policy-links">

        <a class="policy-link" href="reel-reset-privacy.html">
            <span class="app-name">
                Reel Reset
                <span class="arrow">→</span>
            </span>
            <span class="app-desc">Intentional phone use app</span>
        </a>

        <a class="policy-link" href="sudoku-warrior-privacy.html">
            <span class="app-name">
                Sudoku Warrior
                <span class="arrow">→</span>
            </span>
            <span class="app-desc">Competitive iOS Sudoku game</span>
        </a>

    </div>

</body>
</html>
